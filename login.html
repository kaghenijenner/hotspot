<!doctype html>
<html>
  <head>
    <title id="title">JO_CONNECT</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <meta name="theme-color" content="#3B5998" />
    <meta
      name="viewport"
      content="width=device-width; initial-scale=1.0; maximum-scale=1.0;"
    />
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "segoe ui", Verdana, Roboto,
          "helvetica neue", Arial, sans-serif, "apple color emoji";
        font-size: 14px;
        margin: 0;
        overflow: hidden;
      }

      @font-face {
        font-family: "fontello";
        src: url("./font/fontello.eot?78273339");
        src:
          url("./font/fontello.eot?78273339#iefix") format("embedded-opentype"),
          url("./font/fontello.woff?78273339") format("woff"),
          url("./font/fontello.ttf?78273339") format("truetype"),
          url("./font/fontello.svg?78273339#fontello") format("svg");
        font-weight: normal;
        font-style: normal;
      }

      .icon {
        font-family: "fontello";
        font-style: normal;
        font-weight: normal;
        speak: none;
        display: inline-block;
        text-decoration: inherit;
        width: 1em;
        margin-right: 0.2em;
        text-align: center;
        font-variant: normal;
        text-transform: none;
        line-height: 1em;
        margin-left: 0.2em;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      iframe {
        float: left;
        height: 22px;
        width: 100%;
      }
      .main {
        background: green;
        color: #f2f2f2;
        max-width: 300px;
        height: 100%;
        border-radius: 5px;
        padding: 10px;
        margin-top: 10%;
        margin-left: auto;
        margin-right: auto;
        transition: 0.3s;
        text-align: center;
        min-height: 300px;
        animation: fadein 1s;
        -moz-animation: fadein 1s; /* Firefox */
        -webkit-animation: fadein 1s; /* Safari and Chrome */
        -o-animation: fadein 1s; /* Opera */
      }

      .box {
        margin-bottom: 10px;
        text-align: center;
      }

      .brand {
        color: #ffffff;
        padding: 0px;
        margin: 10px;
        font-size: 35px;
        border-bottom: solid 2px #fff;
      }

      .username {
        background-color: #fdfbfb;
        border: none;
        border-radius: 3px;
        border-bottom: 1px solid #f2f2f2;
        text-align: center;
        font-size: 16px;
        color: #000000;
        outline: none;
        width: 100%;
        height: 35px;
      }

      .password {
        background-color: #fdfbfb;
        border: none;
        border-radius: 0px 0px 3px 3px;
        border-top: 1px solid #f2f2f2;
        text-align: center;
        font-size: 16px;
        color: #000000;
        outline: none;
        width: 100%;
        height: 35px;
      }

      .button {
        background-color: #d9d9d9;
        background-image: linear-gradient(#d9d9d9, #e6e6e6, #d9d9d9);
        border: none;
        border-radius: 3px;
        color: #595959;
        font-weight: bold;
        text-align: center;
        vertical-align: middle;
        text-decoration: none;
        display: inline-block;
        font-size: 16px;
        margin-top: 10px;
        margin-bottom: 10px;
        cursor: pointer;
        width: 100%;
        height: 40px;
      }
      .button:hover {
        font-weight: bold;
        box-shadow:
          0 10px 15px 0 rgba(0, 0, 0, 0.2),
          0 6px 20px 0 rgba(0, 0, 0, 0.19);
      }

      .button2 {
        background-color: #d32f2f;
        background-image: linear-gradient(#d32f2f, #ef5350, #d32f2f);
        border: none;
        border-radius: 3px;
        color: #f2f2f2;
        font-weight: bold;
        text-align: center;
        vertical-align: middle;
        text-decoration: none;
        display: inline-block;
        font-size: 16px;
        margin-top: 10px;
        margin-bottom: 10px;
        cursor: pointer;
        width: 100%;
        height: 40px;
      }
      .button2:hover {
        font-weight: bold;
        box-shadow:
          0 10px 15px 0 rgba(0, 0, 0, 0.2),
          0 6px 20px 0 rgba(0, 0, 0, 0.19);
      }

      .small-button {
        background-color: #d9d9d9;
        background-image: linear-gradient(#d9d9d9, #e6e6e6, #d9d9d9);
        border: none;
        border-radius: 3px;
        color: #595959;
        font-weight: bold;
        text-align: center;
        vertical-align: middle;
        text-decoration: none;
        display: inline-block;
        cursor: pointer;
        height: 30px;
        width: 32%;
      }

      .notice {
        background-color: #fff8e1;
        border-radius: 3px;
        padding: 1px;
        margin-bottom: 10px;
        font-size: 14px;
        color: #000;
      }
      .table {
        width: 100%;
        border-collapse: collapse !important;
      }
      .table td,
      .table th {
        padding: 5px;
        border: 1px solid #f2f2f2 !important;
        color: #f3f4f5;
      }

      .table td,
      th,
      a {
        color: #f3f4f5;
        text-decoration: none;
      }

      .table2 {
        width: 100%;
        border-collapse: collapse !important;
        background-color: #fff;
        text-align: left;
      }
      .table2 td,
      .table2 th {
        padding: 5px;
        border: 1px solid #000 !important;
      }

      .table2 td,
      th,
      a {
        color: #000;
        text-decoration: none;
      }

      @keyframes fadein {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @-moz-keyframes fadein {
        /* Firefox */
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @-webkit-keyframes fadein {
        /* Safari and Chrome */
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @-o-keyframes fadein {
        /* Opera */
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      /* @media */
      @media screen and (max-width: 600px) {
        .main {
          width: 90%;
          margin-top: 10%;
        }
      }

      /* @media */
      @media screen and (min-width: 600px) {
        .main {
          margin-top: 2%;
        }
      }
    </style>
  </head>

  <body>
    <form name="sendin" action="$(link-login-only)" method="post">
      <input type="hidden" name="username" />
      <input type="hidden" name="password" />
      <input type="hidden" name="dst" value="$(link-orig)" />
      <input type="hidden" name="popup" value="true" />
    </form>

    <script type="text/javascript" src="md5.js"></script>
    <script type="text/javascript">
      function doLogin() {
        document.sendin.username.value = document.login.username.value;
        document.sendin.password.value = hexMD5(
          "$(chap-id)" + document.login.password.value + "$(chap-challenge)",
        );
        document.sendin.submit();
        return false;
      }
    </script>

    <div id="main" class="main">
      <div class="box">
        <h3 class="brand">JO_CONNECT</h3>
      </div>
      <div class="box">
        <button id="btnvrc" class="small-button" onclick="voucher()">
          <i class="icon icon-ticket">&#xe802;</i> Voucher
        </button>
        <button id="btnmem" class="small-button" onclick="member()">
          <i class="icon icon-user-circle-o">&#xf2be;</i> Member
        </button>
      </div>
      <div class="box" id="infologin"></div>
      <form
        autocomplete="off"
        name="login"
        action="$(link-login-only)"
        method="post"
        $(if
        chap-id)
        onSubmit="return doLogin()"
        $(endif)
      >
        <input type="hidden" name="dst" value="$(link-orig)" />
        <input type="hidden" name="popup" value="true" />
        <input class="username" name="username" type="text" />
        <input
          class="password"
          name="password"
          placeholder="Password"
          type="hidden"
        />

        <button class="button" type="submit">
          <i class="icon icon-login">&#xe803;</i> Connexion
        </button>
      </form>
      <div class="notice"></div>

      <table class="table">
        <caption style="font-size: 16px; font-weight: bold; margin-bottom: 5px">
          NOS TARIFS WIFI
        </caption>
        <tr>
          <th>Forfait</th>
          <th>Validite</th>
          <th>Prix CDF</th>
        </tr>
        <tr>
          <td>Illimtees</td>
          <td>24 heurs</td>
          <td>1.500</td>
        </tr>
        <tr>
          <td>Illimitees</td>
          <td>12 heurs</td>
          <td>1.000</td>
        </tr>
        <tr>
          <td>Illimitees</td>
          <td>3 heurs</td>
          <td>500</td>
        </tr>
        <tr>
          <td>Illimitees</td>
          <td>7 jours</td>
          <td>8.000</td>
        </tr>
        <tr>
          <td>Illimitees</td>
          <td>30 jours</td>
          <td>25.000</td>
        </tr>
      </table>
      <br />
      <div>
        Contact du Technicien
        <br />
        Numero whatsapp :
        <a href="https://wa.me/+243995509110" style="color: #fff"
          >+243 995 509 110</a
        >
      </div>
    </div>
    <br />

    <script type="text/javascript">
      var hostname = window.location.hostname;
      document.getElementById("title").innerHTML = hostname + " > login";

      document.login.username.focus();

      var infologin = document.getElementById("infologin");
      infologin.innerHTML =
        "Savourez la connection illimitée dans Vos services. Nous sommes content de vous revoir";

      // login page 2 mode by Laksamadi Guko
      var username = document.login.username;
      var password = document.login.password;

      username.placeholder = "Entrer votre code ici";

      // set password = username
      function setpass() {
        var user = username.value;
        //user = user.toLowerCase();
        username.value = user;
        password.value = user;
      }

      username.onkeyup = setpass;

      // change to voucher mode
      function voucher() {
        username.focus();
        username.onkeyup = setpass;
        username.placeholder = "Entrer votre code ici";
        username.style = "border-radius:3px;";
        password.type = "hidden";
        infologin.innerHTML =
          "Savourez la connection illimitée dans Vos services. Nous sommes content de vous revoir";
      }

      // change to member mode
      function member() {
        username.focus();
        username.onkeyup = "";
        username.placeholder = "Username";
        username.style = "border-radius:3px 3px 0px 0px; margin-bottom:10px;";
        password.type = "password";
        infologin.innerHTML =
          "Bienvenue <br /> Entrez votre nom d'utilisateur et votre mot de passe puis cliquez sur connexion.";
      }
    </script>
  </body>
</html>
